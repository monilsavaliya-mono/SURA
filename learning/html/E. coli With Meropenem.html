<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parameter Sources</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c12;--s1:#131320;--s2:#1a1a28;--s3:#1f1f30;
  --b1:#222235;--b2:#30304a;
  --t1:#dcdcf0;--t2:#7878a0;--t3:#454560;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:-apple-system,'Segoe UI',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);font-size:14px;line-height:1.6;padding:2rem 1.5rem}
.wrap{max-width:980px;margin:0 auto}

/* filter */
.filters{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:1.25rem;border-bottom:1px solid var(--b1);margin-bottom:1.5rem}
.chip{font-family:var(--mono);font-size:11px;padding:4px 13px;border-radius:20px;border:1px solid var(--b2);background:transparent;cursor:pointer;transition:all .12s;outline:none}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:11px}

/* card */
.card{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--ac);border-radius:10px;overflow:hidden}
.card-top{display:flex;align-items:flex-start;gap:14px;padding:14px 16px 8px;cursor:pointer;user-select:none}
.card-top:hover{background:var(--s2)}
.psym{font-family:var(--mono);font-size:1.75rem;font-weight:600;line-height:1;color:var(--ac);min-width:3.2rem;padding-top:2px;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-size:11px;color:var(--t2);margin-bottom:3px}
.pval{font-family:var(--mono);font-size:.9rem;font-weight:500}
.pref{font-size:11px;color:var(--t3);margin-top:3px;font-style:italic}
.ptags{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.tag{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:3px;border:1px solid;white-space:nowrap}

.expand{display:flex;align-items:center;gap:5px;padding:2px 16px 11px;font-family:var(--mono);font-size:10px;color:var(--t3);cursor:pointer;user-select:none}
.expand:hover{color:var(--t2)}
.arr{display:inline-block;transition:transform .18s;font-size:9px}
.card.open .arr{transform:rotate(90deg)}

.details{display:none;border-top:1px solid var(--b1);padding:14px 16px 16px}
.card.open .details{display:block}

.dlabel{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sec{margin-top:13px}
.sec:first-child{margin-top:0}

.src-note{font-size:12px;color:var(--t2);border-left:2px solid var(--ac);padding:6px 10px;border-radius:0 4px 4px 0}
.cite{font-size:12px;color:var(--t2);line-height:1.85}
.cite-title{color:var(--t1);font-style:italic}
.cite-doi{color:var(--t3);font-family:var(--mono);font-size:10px}
.mathbox{background:var(--s3);border-radius:6px;padding:10px 14px;font-family:var(--mono);font-size:11.5px;line-height:1.9;color:var(--t1)}
.links{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.lnk{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid;text-decoration:none;color:var(--ac);opacity:.85;transition:opacity .12s}
.lnk:hover{opacity:1}

.hidden{display:none!important}
@media(max-width:520px){.grid{grid-template-columns:1fr}.psym{font-size:1.35rem}}
</style>
</head>
<body>
<div class="wrap">
  <div id="fb" class="filters"></div>
  <div id="grid" class="grid"></div>
</div>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function rgbp(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)].join(',')}

const TC={
  Biology:   {bg:'rgba(29,158,117,.14)',  bd:'#1D9E75',tx:'#5DCAA5'},
  PK:        {bg:'rgba(55,138,221,.14)',  bd:'#378ADD',tx:'#85B7EB'},
  PD:        {bg:'rgba(239,159,39,.14)',  bd:'#EF9F27',tx:'#FAC775'},
  Resistance:{bg:'rgba(216,90,48,.14)',   bd:'#D85A30',tx:'#F0997B'},
  Mutation:  {bg:'rgba(127,119,221,.14)', bd:'#7F77DD',tx:'#AFA9EC'},
  Theory:    {bg:'rgba(136,135,128,.14)', bd:'#888780',tx:'#B4B2A9'},
};

// ─── ADD MORE ENTRIES HERE ───────────────────────────────────────────────────
const DATA=[
  {
    sym:'k₁', name:'Sensitive E. coli growth rate', val:'0.733 h⁻¹',
    tags:['Biology','PD'], ref:'Göttig et al., 2024',
    src:'Table 2 — k_{growth,max} · murine thigh infection model',
    cite:{
      au:'Göttig S, Hamprecht AG, Vehreschild MJGT, et al.',
      ti:'PK/PD modelling and simulation of longitudinal meropenem in vivo effects against E. coli and K. pneumoniae strains with high MICs',
      jo:'Int. J. Antimicrobial Agents · 2024',
      doi:'10.1016/j.ijantimicag.2024.107292'
    },
    links:[
      {lb:'ScienceDirect',url:'https://sciencedirect.com/science/article/pii/S0924857924003054'},
      {lb:'DOI',url:'https://doi.org/10.1016/j.ijantimicag.2024.107292'}
    ],
    math:'k₁ = k_{growth,max} = 0.733 /h\n(directly from Table 2 — no further calculation)',
    color:'#1D9E75'
  },
  {
    sym:'k₂(t)', name:'Antibiotic killing rate', val:'Hill function of C(t)',
    tags:['PK','PD'], ref:'Bax et al., 1989  ×  Göttig et al., 2024',
    src:'Bax → C₀ = 30 mg/L, t½ = 1 h  |  Göttig Table 2 → E_max = 0.672, EC₅₀ = 1.01',
    cite:{
      au:'Bax RP, Bastain W, et al. (PK params)  /  Göttig S, et al. (PD params)',
      ti:'Pharmacokinetics of meropenem in volunteers  +  PK/PD modelling (meropenem vs E. coli)',
      jo:'J. Antimicrobial Chemotherapy 1989  +  Int. J. Antimicrobial Agents 2024',
      doi:'10.1093/jac/24.suppl_A.311'
    },
    links:[
      {lb:'PubMed (Bax)',url:'https://pubmed.ncbi.nlm.nih.gov/7648757/'},
      {lb:'ScienceDirect (Göttig)',url:'https://sciencedirect.com/science/article/pii/S0924857924003054'}
    ],
    math:'C(t) = 30 · e^{−0.693 · (t mod 8)}\nk₂(t) = (0.672 · C(t)) / (1.01 + C(t))\n\n→ Peak  (t = 0):   k₂ = 0.650 /h\n→ Trough (t = 8h): k₂ = 0.070 /h',
    color:'#378ADD'
  },
  {
    sym:'k₃', name:'Resistant E. coli growth rate', val:'0.679 h⁻¹',
    tags:['Biology','Resistance'], ref:'Vanacker et al., 2023',
    src:'Figure 3 — forest plot, beta-lactams row  ·  relative fitness = 0.927  (n = 493 strains, 95% CI: 0.612–1.241)',
    cite:{
      au:'Vanacker M, Lenuzza N, Rasigade JP',
      ti:'The fitness cost of horizontally transferred and mutational antimicrobial resistance in Escherichia coli',
      jo:'Frontiers in Microbiology · 2023',
      doi:'10.3389/fmicb.2023.1186920'
    },
    links:[
      {lb:'PMC',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC10348881/'},
      {lb:'DOI',url:'https://doi.org/10.3389/fmicb.2023.1186920'}
    ],
    math:'Relative fitness (beta-lactam resistant E. coli) = 0.927\nk₃ = k₁ × 0.927 = 0.733 × 0.927 = 0.679 /h\n(7.3% growth penalty from resistance plasmid)',
    color:'#D85A30'
  },
  {
    sym:'k₄', name:'Natural bacterial death rate', val:'0.179 h⁻¹',
    tags:['Biology','PD'], ref:'Göttig et al., 2024',
    src:'Table 2 — k_{death} · fixed from ref [23] · antibiotic-free control experiments',
    cite:{
      au:'Göttig S, Hamprecht AG, Vehreschild MJGT, et al.',
      ti:'PK/PD modelling and simulation of longitudinal meropenem in vivo effects against E. coli and K. pneumoniae strains with high MICs',
      jo:'Int. J. Antimicrobial Agents · 2024',
      doi:'10.1016/j.ijantimicag.2024.107292'
    },
    links:[
      {lb:'ScienceDirect',url:'https://sciencedirect.com/science/article/pii/S0924857924003054'},
      {lb:'DOI',url:'https://doi.org/10.1016/j.ijantimicag.2024.107292'}
    ],
    math:'k₄ = k_{death} = 0.179 /h\n(bacterial clearance without antibiotic pressure)',
    color:'#1D9E75'
  },
  {
    sym:'k₅', name:'Mutation rate  S → R', val:'7.8 × 10⁻⁷ h⁻¹',
    tags:['Mutation','Biology'], ref:'Sung et al., 2012',
    src:'Table 1 — E. coli base substitution rate = 2.45×10⁻¹⁰ per nucleotide per generation',
    cite:{
      au:'Sung W, Ackerman MS, Miller SF, Doak TG, Lynch M',
      ti:'Drift-barrier hypothesis and mutation-rate evolution',
      jo:'PNAS · 2012',
      doi:'PMC3478608'
    },
    links:[
      {lb:'PMC',url:'https://pmc.ncbi.nlm.nih.gov/articles/PMC3478608/'}
    ],
    math:'μ = 2.45×10⁻¹⁰ /nt/gen  ×  3000 nt (target gene region)\n  = 7.35×10⁻⁷ /generation\n\ngen/h = k₁ / ln(2) = 0.733 / 0.693 = 1.058\nk₅   = 7.35×10⁻⁷ × 1.058 ≈ 7.8×10⁻⁷ /h',
    color:'#7F77DD'
  },
  {
    sym:'E_max', name:'Maximum drug killing rate', val:'0.672 h⁻¹',
    tags:['PD'], ref:'Göttig et al., 2024',
    src:'Table 2 — E_max (Hill equation saturation ceiling)',
    cite:{
      au:'Göttig S, Hamprecht AG, Vehreschild MJGT, et al.',
      ti:'PK/PD modelling and simulation of longitudinal meropenem in vivo effects against E. coli and K. pneumoniae strains with high MICs',
      jo:'Int. J. Antimicrobial Agents · 2024',
      doi:'10.1016/j.ijantimicag.2024.107292'
    },
    links:[
      {lb:'ScienceDirect',url:'https://sciencedirect.com/science/article/pii/S0924857924003054'}
    ],
    math:'E_max = 0.672 /h\nMaximum killing rate as C → ∞\nNumerator constant in k₂(t)',
    color:'#EF9F27'
  },
  {
    sym:'EC₅₀', name:'Half-maximal effective conc.', val:'1.01 mg/L',
    tags:['PD'], ref:'Göttig et al., 2024',
    src:'Table 2 — EC₅₀ (Hill equation half-saturation constant)',
    cite:{
      au:'Göttig S, Hamprecht AG, Vehreschild MJGT, et al.',
      ti:'PK/PD modelling and simulation of longitudinal meropenem in vivo effects against E. coli and K. pneumoniae strains with high MICs',
      jo:'Int. J. Antimicrobial Agents · 2024',
      doi:'10.1016/j.ijantimicag.2024.107292'
    },
    links:[
      {lb:'ScienceDirect',url:'https://sciencedirect.com/science/article/pii/S0924857924003054'}
    ],
    math:'EC₅₀ = 1.01 mg/L\nHill coefficient h = 1 (fixed, Michaelis-Menten)\nk₂(t) = E_max · C(t) / (EC₅₀ + C(t))',
    color:'#EF9F27'
  },
  {
    sym:'C₀', name:'Peak drug concentration', val:'30 mg/L',
    tags:['PK'], ref:'Bax et al., 1989',
    src:'C_max after 1g IV bolus meropenem (healthy volunteers)',
    cite:{
      au:'Bax RP, Bastain W, Featherstone A, Mulcahy DL, Sutherland R, Wise R',
      ti:'The pharmacokinetics of meropenem in volunteers',
      jo:'J. Antimicrobial Chemotherapy · 1989',
      doi:'10.1093/jac/24.suppl_A.311'
    },
    links:[
      {lb:'PubMed',url:'https://pubmed.ncbi.nlm.nih.gov/7648757/'}
    ],
    math:'C₀ = 30 mg/L  (C_max, 1g IV bolus)\nt½ = 1 h  →  λ = ln(2)/1 = 0.693 /h\nΔt = 8 h dosing interval (standard clinical)',
    color:'#378ADD'
  },
  {
    sym:'λ', name:'Drug elimination rate', val:'0.693 h⁻¹',
    tags:['PK'], ref:'Bax et al., 1989',
    src:'Derived from serum half-life t½ = 1 hour',
    cite:{
      au:'Bax RP, Bastain W, Featherstone A, Mulcahy DL, Sutherland R, Wise R',
      ti:'The pharmacokinetics of meropenem in volunteers',
      jo:'J. Antimicrobial Chemotherapy · 1989',
      doi:'10.1093/jac/24.suppl_A.311'
    },
    links:[
      {lb:'PubMed',url:'https://pubmed.ncbi.nlm.nih.gov/7648757/'}
    ],
    math:'λ = ln(2) / t½ = 0.693 / 1.0 = 0.693 /h\nC(t) = C₀ · e^{−λt}  (mono-exponential decay)',
    color:'#378ADD'
  },
  {
    sym:'AMR', name:'Clinical context — India', val:'62.9% susceptible (2024)',
    tags:['Resistance'], ref:'ICMR AMRSN, 2025',
    src:'E. coli meropenem susceptibility 2024 · 8th edition · declining from 73.2% (2017)',
    cite:{
      au:'ICMR Antimicrobial Resistance Research & Surveillance Network (AMRSN)',
      ti:'Annual Report 2024 — Antimicrobial Resistance Research and Surveillance Network (8th Edition)',
      jo:'Division of Descriptive Research, ICMR, New Delhi · 2025',
      doi:'N/A'
    },
    links:[
      {lb:'ICMR PDF',url:'https://www.icmr.gov.in/icmrobject/uploads/Report/1763981012_icmramrsnannualreport2024.pdf'}
    ],
    math:'Susceptibility 2024 (all): 62.9%\nICU isolates:             58.2%\nTrend: ↓ from 73.2% in 2017\nNDM = dominant carbapenemase gene in India',
    color:'#D85A30'
  },
  {
    sym:'HJB', name:'Optimal control framework', val:'Theoretical',
    tags:['Theory'], ref:'Horiguchi & Kobayashi, 2025',
    src:'PRX Life vol.3 · Hamilton-Jacobi-Bellman, Cole-Hopf, Z-function, KL-divergence cost',
    cite:{
      au:'Horiguchi SA, Kobayashi TJ',
      ti:'Optimal control of stochastic reaction networks with entropic control cost and emergence of mode-switching strategies',
      jo:'PRX Life · 2025',
      doi:'10.1103/PRXLife.3.033027'
    },
    links:[
      {lb:'DOI',url:'https://doi.org/10.1103/PRXLife.3.033027'},
      {lb:'APS',url:'https://journals.aps.org/prxlife/abstract/10.1103/PRXLife.3.033027'}
    ],
    math:'HJB equation → Cole-Hopf transform → Z-function\nOptimal k†ᵢⱼ = k⁰ᵢⱼ · (Zⱼ / Zᵢ)\nCost = KL-divergence from reference rates k⁰',
    color:'#888780'
  },
];
// ─────────────────────────────────────────────────────────────────────────────

// build filter chips
const cats=['all','Biology','PK','PD','Resistance','Mutation','Theory'];
const fb=document.getElementById('fb');
cats.forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip';
  b.textContent=cat;
  b.dataset.cat=cat;
  const c=TC[cat];
  if(c){b.style.cssText=`border-color:${c.bd};color:${c.tx}`}
  else{b.style.cssText='border-color:#30304a;color:#7878a0'}
  if(cat==='all') setActive(b,'all');
  b.onclick=()=>{
    document.querySelectorAll('.chip').forEach(x=>{
      const xc=TC[x.dataset.cat];
      if(xc) x.style.cssText=`border-color:${xc.bd};color:${xc.tx};background:transparent;font-weight:400`;
      else x.style.cssText='border-color:#30304a;color:#7878a0;background:transparent;font-weight:400';
    });
    setActive(b,cat);
    document.querySelectorAll('.card').forEach(card=>{
      const tags=card.dataset.tags.split(',');
      card.classList.toggle('hidden', cat!=='all' && !tags.includes(cat));
    });
  };
  fb.appendChild(b);
});

function setActive(b,cat){
  const c=TC[cat];
  if(c) b.style.cssText=`border-color:${c.bd};color:#0c0c12;background:${c.bd};font-weight:600`;
  else  b.style.cssText='border-color:#dcdcf0;color:#0c0c12;background:#dcdcf0;font-weight:600';
}

// build cards
const grid=document.getElementById('grid');
DATA.forEach(p=>{
  const tagsH=p.tags.map(t=>{
    const c=TC[t]||{bg:'transparent',bd:'#555',tx:'#999'};
    return`<span class="tag" style="background:${c.bg};border-color:${c.bd};color:${c.tx}">${t}</span>`;
  }).join('');

  const linksH=p.links.map(l=>
    `<a class="lnk" href="${l.url}" target="_blank" rel="noopener" style="color:${p.color};border-color:rgba(${rgbp(p.color)},.3)">${l.lb} ↗</a>`
  ).join('');

  const mathH=p.math.split('\n').map(ln=>`<div>${esc(ln)||'&nbsp;'}</div>`).join('');

  const card=document.createElement('div');
  card.className='card';
  card.dataset.tags=p.tags.join(',');
  card.style.setProperty('--ac',p.color);
  card.innerHTML=`
    <div class="card-top">
      <div class="psym">${p.sym}</div>
      <div class="pinfo">
        <div class="pname">${esc(p.name)}</div>
        <div class="pval">${esc(p.val)}</div>
        <div class="pref">${esc(p.ref)}</div>
      </div>
      <div class="ptags">${tagsH}</div>
    </div>
    <div class="expand"><span class="arr">▶</span><span>details</span></div>
    <div class="details">
      <div class="sec">
        <div class="dlabel">extracted from</div>
        <div class="src-note" style="border-color:${p.color};background:rgba(${rgbp(p.color)},.07)">${esc(p.src)}</div>
      </div>
      <div class="sec">
        <div class="dlabel">citation</div>
        <div class="cite">
          ${esc(p.cite.au)}<br>
          <span class="cite-title">${esc(p.cite.ti)}</span><br>
          ${esc(p.cite.jo)}
          ${p.cite.doi!=='N/A'?`<br><span class="cite-doi">DOI: ${esc(p.cite.doi)}</span>`:''}
        </div>
      </div>
      <div class="sec">
        <div class="dlabel">derivation</div>
        <div class="mathbox">${mathH}</div>
      </div>
      <div class="links">${linksH}</div>
    </div>`;

  const tog=()=>card.classList.toggle('open');
  card.querySelector('.card-top').addEventListener('click',tog);
  card.querySelector('.expand').addEventListener('click',tog);
  grid.appendChild(card);
});
</script>
</body>
</html>
